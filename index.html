<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Vocabulary Builder</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body
    class="min-h-screen bg-linear-to-br from-indigo-600 via-purple-400 to-pink-500 p-5"
  >
    <div class="max-w-7xl mx-auto">
      <!-- Header Section -->
      <div class="text-center mb-8">
        <h1 class="text-5xl font-extrabold text-white drop-shadow-lg">
          📚 Wordwise AI
        </h1>
        <p class="text-white/90 mt-3 text-lg">
          Learn new words with the power of AI!
        </p>
      </div>

      <div class="grid lg:grid-cols-5 gap-6">
        <!-- Left Side -->
        <div class="lg:col-span-2 space-y-6">
          <!-- Search Box -->
          <div
            class="bg-white/15 backdrop-blur-lg border border-white/20 rounded-3xl p-6 shadow-2xl"
          >
            <h2 class="text-2xl font-bold text-white mb-4 text-center">
              🔍 Search Vocabulary
            </h2>
            <input
              type="text"
              placeholder="Enter Any Word..."
              id="wordInput"
              class="w-full px-4 py-3 rounded-xl bg-white/80 outline-none text-gray-800"
            />
            <button
              id="searchBtn"
              class="w-full mt-4 bg-linear-to-r from-indigo-500 to-pink-500 text-white py-3 rounded-xl font-semibold hover:scale-105 transition-all duration-500"
            >
              Search
            </button>

            <div
              id="loading"
              class="hidden mt-4 text-center text-white font-semibold animate-pulse"
            >
              🤖 AI is generating results...
            </div>
          </div>

          <!-- Saved Words -->
          <div
            id="savedWords"
            class="bg-white/15 backdrop-blur-lg border border-white/20 rounded-3xl p-6 shadow-2xl"
          >
            <h2 class="text-2xl font-bold text-white mb-4 text-center">
              ⭐ My Word Bank
            </h2>
            <ul id="wordList" class="space-y-2 text-white"></ul>
          </div>
        </div>

        <!-- Right Side -->
        <div class="lg:col-span-3 space-y-6">
          <!-- Result Box -->
          <div
            id="resultBox"
            class="hidden bg-white/15 backdrop-blur-lg border border-white/20 rounded-3xl p-6 shadow-2xl"
          >
            <div class="flex justify-between items-center mb-5">
              <h2 id="wordTitle" class="text-4xl font-bold text-white"></h2>
              <button
                id="saveBtn"
                class="bg-green-500 hover:bg-green-600 px-5 py-3 rounded-xl text-white font-semibold"
              >
                ⭐ Save Word
              </button>
            </div>

            <div class="space-y-4">
              <div class="bg-white/10 p-4 rounded-xl">
                <p id="wordMeaning" class="text-white"></p>
              </div>
              <div class="bg-white/10 p-4 rounded-xl">
                <p id="wordExample" class="text-white"></p>
              </div>
              <div class="bg-white/10 p-4 rounded-xl">
                <p id="wordSynonyms" class="text-white"></p>
              </div>
              <div class="bg-white/10 p-4 rounded-xl">
                <p id="wordAntonyms" class="text-white"></p>
              </div>
            </div>
          </div>

          <!-- Quiz Box -->
          <div
            id="quizBox"
            class="hidden bg-white/15 backdrop-blur-lg border border-white/20 rounded-3xl p-6 shadow-2xl"
          >
            <h2 class="text-2xl font-bold text-white mb-4">🧠 Quick Quiz</h2>
            <p class="text-white mb-4 font-semibold" id="quizQuestion"></p>
            <input
              type="text"
              id="quizAnswer"
              placeholder="Enter Your Answer..."
              class="w-full px-4 py-3 rounded-xl bg-white/80 text-gray-800 outline-none"
            />
            <button
              id="checkQuiz"
              class="mt-6 bg-indigo-600 hover:bg-indigo-700 px-5 py-3 rounded-xl text-white font-semibold text-lg"
            >
              Check Answer
            </button>
            <p id="quizResult" class="mt-4 text-lg font-bold"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
